<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twoje portfolio i nie tylko!</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

:root{
  --main:#4f46e5;
  --accent:#06b6d4;
}

body {
  margin: 0;
  font-family: Inter;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-right: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  color: white;
  text-align: left;
  transition: 0.2s;
}

.sidebar button:hover {
  background: rgba(255,255,255,0.15);
  transform: translateX(3px);
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* HEADER */
header {
  padding: 25px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--main), var(--accent));
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 16px;
  margin-top: 12px;
}

/* INPUTS */
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* BUTTON */
.create-btn {
  background: linear-gradient(135deg, var(--main), var(--accent));
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

/* DRAWER */
.drawer {
  position: fixed;
  top: 0;
  right: -420px;
  width: 380px;
  height: 100%;
  background: rgba(15,23,42,0.98);
  backdrop-filter: blur(10px);
  border-left: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
  z-index: 999;
}

.drawer.active {
  right: 0;
}

.drawer-content {
  padding: 20px;
}

/* SMALL */
.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>📁 Menu</h3>

  <button onclick="showTab('list')">📂 Portfolio</button>
  <button onclick="openCreate()">➕ Utwórz</button>
  <button onclick="showTab('account')">👤 Konto</button>
  <button onclick="showTab('settings')">⚙️ Ustawienia</button>

  <br>
  <label class="small">Sortowanie</label>
  <select onchange="setSort(this.value)">
    <option value="new">🆕 Najnowsze</option>
    <option value="old">📜 Najstarsze</option>
  </select>
</div>

<!-- MAIN -->
<div class="main">

<header>
  <h1>Twoje portfolio i nie tylko!</h1>
  <p>discord.gg/developerzy</p>
</header>

<div id="list"></div>

<!-- ACCOUNT -->
<div id="account" style="display:none;">
  <h2>👤 Konto</h2>
  <div id="myList"></div>
</div>

<!-- SETTINGS -->
<div id="settings" style="display:none;">
  <h2>⚙️ Ustawienia</h2>

  <input type="color" onchange="changeColor(this.value)">
  <select onchange="changeCursor(this.value)">
    <option value="default">Default</option>
    <option value="pointer">Pointer</option>
    <option value="grab">Grab</option>
  </select>
</div>

</div>

<!-- DRAWER -->
<div id="createDrawer" class="drawer">
  <div class="drawer-content">

    <h2>➕ Utwórz portfolio</h2>

    <input id="name" placeholder="Nick">
    <input id="discord" placeholder="Discord">
    <textarea id="desc" placeholder="Opis"></textarea>

    <select id="visibility">
      <option value="public">🌍 Publiczne</option>
      <option value="private">🔒 Prywatne</option>
    </select>

    <input id="file" type="file" accept="image/*,video/*">

    <button class="create-btn" onclick="createPortfolio()">Stwórz</button>

    <button onclick="closeCreate()" style="margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;background:#ef4444;color:white;">
      Zamknij
    </button>

  </div>
</div>

<script>

let portfolios = [];
let sortMode = "new";

/* TAB */
function showTab(tab){
  document.getElementById("list").style.display = tab==="list"?"block":"none";
  document.getElementById("account").style.display = tab==="account"?"block":"none";
  document.getElementById("settings").style.display = tab==="settings"?"block":"none";

  render();
  renderAccount();
}

/* DRAWER */
function openCreate(){
  document.getElementById("createDrawer").classList.add("active");
}

function closeCreate(){
  document.getElementById("createDrawer").classList.remove("active");
}

/* SORT */
function setSort(type){
  sortMode = type;
  render();
}

/* CREATE */
function createPortfolio(){
  let file = document.getElementById("file").files[0];
  if(!file) return alert("Wybierz plik!");

  let reader = new FileReader();

  reader.onload = function(e){

    portfolios.push({
      name:name.value,
      discord:discord.value,
      desc:desc.value,
      media:e.target.result,
      type:file.type.startsWith("image")?"image":"video",
      visibility:document.getElementById("visibility").value,
      created:Date.now()
    });

    closeCreate();
    showTab("list");
  };

  reader.readAsDataURL(file);
}

/* RENDER PUBLIC */
function render(){

  let list = document.getElementById("list");
  list.innerHTML = "";

  let arr = [...portfolios];

  arr.sort((a,b)=>{
    return sortMode==="new" ? b.created - a.created : a.created - b.created;
  });

  arr.forEach((p,i)=>{

    if(p.visibility === "private") return;

    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <p class="small">🕒 ${new Date(p.created).toLocaleString()}</p>
        <p>${p.visibility==="public"?"🌍 Publiczne":"🔒 Prywatne"}</p>
      </div>
    `;
  });
}

/* ACCOUNT (ALL + DELETE OWNER) */
function renderAccount(){

  let box = document.getElementById("myList");
  box.innerHTML = "";

  let arr = [...portfolios];

  arr.sort((a,b)=>{
    return sortMode==="new" ? b.created - a.created : a.created - b.created;
  });

  arr.forEach((p,i)=>{

    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <p class="small">🕒 ${new Date(p.created).toLocaleString()}</p>
        <p>${p.visibility==="public"?"🌍 Publiczne":"🔒 Prywatne"}</p>

        <button onclick="deletePortfolio(${i})" style="margin-top:8px;background:#ef4444;border:none;padding:8px;border-radius:8px;color:white;">
          🗑 Usuń
        </button>
      </div>
    `;
  });
}

/* DELETE */
function deletePortfolio(i){
  portfolios.splice(i,1);
  render();
  renderAccount();
}

/* SETTINGS */
function changeColor(c){
  document.documentElement.style.setProperty("--main", c);
}

function changeCursor(c){
  document.body.style.cursor = c;
}

</script>

</body>
</html>
